<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#090A14',
            primary: '#DF6B33',
            primaryHover: '#c25b28',
            card: '#12131F',
            border: '#1E2030',
            muted: '#6B7280',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { background-color: #090A14; }
    input::placeholder { color: #6B7280; }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #12131F inset !important;
      -webkit-text-fill-color: #E5E7EB !important;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 font-inter text-gray-200 py-10">
  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
        <i data-lucide="user-plus" class="w-7 h-7 text-primary"></i>
      </div>
      <h1 class="font-poppins font-extrabold text-3xl text-white tracking-tight">Create Account</h1>
      <p class="text-muted mt-1 text-sm">Join us and get started today</p>
    </div>

    <!-- Card -->
    <div class="bg-card border border-border rounded-2xl p-6 sm:p-8 shadow-2xl">

      <!-- Form -->
      <form class="space-y-4" onsubmit="return false">

        <!-- Full Name (required) -->
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-300" for="fullname">Full Name <span class="text-primary">*</span></label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <i data-lucide="user" class="w-4 h-4"></i>
            </span>
            <input
              id="fullname"
              type="text"
              placeholder="John Doe"
              required
              class="w-full bg-bg border border-border rounded-xl pl-10 pr-4 py-3 text-sm text-gray-200 placeholder-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            >
          </div>
        </div>

        <!-- Email (required) -->
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-300" for="email">Email Address <span class="text-primary">*</span></label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              required
              class="w-full bg-bg border border-border rounded-xl pl-10 pr-4 py-3 text-sm text-gray-200 placeholder-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            >
          </div>
        </div>

        <!-- Phone (optional) -->
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-300" for="phone">Phone Number <span class="text-muted font-normal">(optional)</span></label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <i data-lucide="phone" class="w-4 h-4"></i>
            </span>
            <input
              id="phone"
              type="tel"
              placeholder="0123456789"
              maxlength="10"
              pattern="[0-9]{10}"
              class="w-full bg-bg border border-border rounded-xl pl-10 pr-4 py-3 text-sm text-gray-200 placeholder-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            >
          </div>
        </div>

        <!-- Gender (optional) -->
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-300">Gender <span class="text-muted font-normal">(optional)</span></label>
          <div class="grid grid-cols-3 gap-2">
            <label class="flex items-center justify-center gap-1.5 bg-bg border border-border rounded-xl py-2.5 px-2 cursor-pointer hover:border-gray-600 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/10 select-none group">
              <input type="radio" name="gender" value="male" class="sr-only">
              <i data-lucide="user" class="w-3.5 h-3.5 text-muted group-has-[:checked]:text-primary"></i>
              <span class="text-xs text-muted group-has-[:checked]:text-primary">Male</span>
            </label>
            <label class="flex items-center justify-center gap-1.5 bg-bg border border-border rounded-xl py-2.5 px-2 cursor-pointer hover:border-gray-600 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/10 select-none group">
              <input type="radio" name="gender" value="female" class="sr-only">
              <i data-lucide="user" class="w-3.5 h-3.5 text-muted group-has-[:checked]:text-primary"></i>
              <span class="text-xs text-muted group-has-[:checked]:text-primary">Female</span>
            </label>
            <label class="flex items-center justify-center gap-1.5 bg-bg border border-border rounded-xl py-2.5 px-2 cursor-pointer hover:border-gray-600 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/10 select-none group">
              <input type="radio" name="gender" value="other" class="sr-only">
              <i data-lucide="users" class="w-3.5 h-3.5 text-muted group-has-[:checked]:text-primary"></i>
              <span class="text-xs text-muted group-has-[:checked]:text-primary">Other</span>
            </label>
          </div>
        </div>

        <!-- Address (optional) -->
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-300" for="address">Address <span class="text-muted font-normal">(optional)</span></label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <i data-lucide="map-pin" class="w-4 h-4"></i>
            </span>
            <input
              id="address"
              type="text"
              placeholder="123 Main St, City"
              class="w-full bg-bg border border-border rounded-xl pl-10 pr-4 py-3 text-sm text-gray-200 placeholder-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            >
          </div>
        </div>

        <!-- Password (required) -->
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-300" for="password">Password <span class="text-primary">*</span></label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input
              id="password"
              type="password"
              placeholder="Min. 8 characters"
              required
              class="w-full bg-bg border border-border rounded-xl pl-10 pr-10 py-3 text-sm text-gray-200 placeholder-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            >
            <button type="button" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-muted hover:text-gray-200 transition-colors" onclick="togglePassword('password', 'eye-pw')">
              <i data-lucide="eye" id="eye-pw" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password (required) -->
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-300" for="confirm">Confirm Password <span class="text-primary">*</span></label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <i data-lucide="lock-keyhole" class="w-4 h-4"></i>
            </span>
            <input
              id="confirm"
              type="password"
              placeholder="Re-enter your password"
              required
              class="w-full bg-bg border border-border rounded-xl pl-10 pr-10 py-3 text-sm text-gray-200 placeholder-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            >
            <button type="button" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-muted hover:text-gray-200 transition-colors" onclick="togglePassword('confirm', 'eye-cp')">
              <i data-lucide="eye" id="eye-cp" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Terms (required) -->
        <div class="pt-1">
          <label class="flex items-start gap-2.5 cursor-pointer select-none">
            <div class="relative mt-0.5">
              <input type="checkbox" id="terms" required class="sr-only peer">
              <div class="w-5 h-5 border border-border rounded-md bg-bg peer-checked:bg-primary peer-checked:border-primary transition-colors flex items-center justify-center shrink-0">
                <i data-lucide="check" class="w-3 h-3 text-white hidden peer-checked:block"></i>
              </div>
            </div>
            <span class="text-sm text-muted leading-relaxed">
              I agree to the <a href="#" class="text-primary hover:text-primaryHover transition-colors">Terms of Service</a> and <a href="#" class="text-primary hover:text-primaryHover transition-colors">Privacy Policy</a> <span class="text-primary">*</span>
            </span>
          </label>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-primary hover:bg-primaryHover text-white font-poppins font-bold py-3 rounded-xl transition-all duration-200 shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] cursor-pointer mt-2"
        >
          Create Account
        </button>
      </form>

    </div>

    <!-- Back to login -->
    <p class="text-center text-sm text-muted mt-6">
      Already have an account?
      <a href="login.html" class="text-primary hover:text-primaryHover transition-colors font-medium">Sign in</a>
    </p>

  </div>

  <script>
    lucide.createIcons();

    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }
  </script>
</body>
</html>
